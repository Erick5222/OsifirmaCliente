name: Build Osinergmin Firmador macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      package_type:
        description: 'Tipo jpackage (app-image, dmg, pkg)'
        required: false
        default: 'app-image'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Verificar herramientas
      run: |
        java -version
        jpackage --version
        uname -m
        xcode-select -p || echo "AVISO: Xcode CLI tools no instaladas (DMG puede fallar)"

    - name: Extraer version
      run: |
        VERSION=$(mvn help:evaluate -Pinstaller-mac -Dexpression=installer.app.version -q -DforceStdout)
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Version: $VERSION"

    - name: Instalar firmaOsinergmin en repositorio local
      run: |
        mvn install:install-file \
          -Dfile=libs/firmaOsinergmin-1.0.jar \
          -DgroupId=pe.gob.osinergmin \
          -DartifactId=firmaOsinergmin \
          -Dversion=1.0 \
          -Dpackaging=jar \
          -DpomFile=libs/firmaOsinergmin-1.0.pom

    - name: Construir empaquetado macOS
      id: build
      continue-on-error: true
      run: |
        chmod +x installer/build-installer-macos.sh
        ./installer/build-installer-macos.sh ${{ github.event.inputs.package_type || 'app-image' }} 2>&1 | tee target/macos-build.log

    - name: Registrar resultado del build
      if: always()
      run: |
        if [ "${{ steps.build.outcome }}" = "success" ]; then
          echo "BUILD_STATUS=ok" >> $GITHUB_ENV
          echo "Build macOS completado."
        else
          echo "BUILD_STATUS=failed" >> $GITHUB_ENV
          echo "::warning::Build macOS fallo. Revisar artifact macOS-build-log y docs/INSTALADOR-MACOS.md"
        fi
        DIST="target/installer/dist"
        if [ -d "$DIST" ]; then
          find "$DIST" -maxdepth 3 | head -30
        else
          echo "No se genero target/installer/dist"
        fi

    - name: Subir artefacto macOS
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Osinergmin-Firmador-macOS-${{ env.APP_VERSION }}
        path: |
          target/installer/dist/**
        if-no-files-found: warn

    - name: Subir log de build
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macOS-build-log-${{ env.APP_VERSION }}
        path: |
          target/macos-build.log
        if-no-files-found: ignore
