# Cliente de firma digital Osinergmin (com.osinergmin.firma.desktop)

# Carpeta base de documentos (resolución de rutas futura del flujo de firma).
# Windows de ejemplo: documents.directory=C:/Users/MiUsuario/Desktop/mis_pdfs
# También: -Dfirma.documents.dir=… o variable FIRMA_DOCUMENTS_DIR
documents.directory=

# Reservado para visor / documentos de demostración cuando se reincorpore PDF.
viewer.fallbackToSampleWhenMissing=true

# API de autenticacion (POST /api/auth/login)
auth.api.baseUrl=http://localhost:8080

# Bitacora Oracle via firma-digital-service (POST /api/bitacora/evento)
bitacora.enabled=true

# Desarrollo: cargar parametros desde JSON en la raiz del proyecto (parametria.path)
# Prioridad: -Dfirma.parametria.enabled, variable FIRMA_PARAMETRIA_ENABLED, esta clave
parametria.enabled=true
# CP-15 firma por tag: parametria.json (copia de parametria-casos/CP-15-alfresco-firma-por-tag.json)
parametria.path=parametria.json

# Motor PAdES (firmaOsinergmin) — misma base que testFirmaOsinergmin
signing.tsl.url=https://iofe.indecopi.gob.pe/TSL/tsl-pe.xml
signing.verify.tsl=false
# Ruta absoluta opcional al PNG del sello grafico.
# Vacio: usa el sello institucional empaquetado (instalacion / JAR).
# Tambien: -Dfirma.signing.image.path=… o variable FIRMA_SIGNING_IMAGE_PATH
signing.image.path=
signing.default.posx=10
signing.default.posy=400
signing.text.size=13
signing.reason=Firma digital OSINERGMIN

# Auditoria HTTP: request/response en archivo (diagnostico de fallos de servicios)
audit.log.enabled=true
audit.log.path=logs/firma-desktop-audit.log

# Panel administracion (roles JWT con acceso; provisional realm-management Keycloak)
admin.jwt.roles=view-clients,query-clients,query-users
